<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Viewer</title>

<style>
body {
  margin:0;
  background:#000;
}

.viewer {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div class="viewer">
  <img id="img">
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
document.getElementById("img").src = urlParams.get('img');
</script>

</body>
</html>
